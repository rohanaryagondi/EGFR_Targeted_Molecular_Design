# Conditional SMILES VAE Training Configuration
#
# This config drives the state-conditioned molecular generator.
# The VAE learns to generate novel SMILES conditioned on EGFR
# conformational states (DFGin_aCin, DFGin_aCout, DFGout_aCin, DFGout_aCout).
#
# Data: ChEMBL EGFR bioactivity (IC50 < 10uM) + known binders
# Expected training time: ~5-15 minutes on single GPU

model:
  vocab_size: 150        # Adjusted during training based on data
  embed_dim: 128
  hidden_dim: 512        # Increased from 256 for better capacity
  latent_dim: 64
  n_layers: 2
  dropout: 0.2           # Increased from 0.1 to reduce overfitting
  n_states: 4
  kl_weight: 0.001       # Reduced from 0.01 to avoid posterior collapse
  pad_idx: 0

training:
  epochs: 300
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.00001
  lr_scheduler: cosine
  patience: 40           # Increased from 20 to allow more exploration
  gradient_clip: 1.0
  device: auto
  checkpoint_dir: artifacts/models/vae/
  log_dir: artifacts/logs/vae/
  seed: 42
  num_workers: 4
  mixed_precision: false

data:
  train_path: data/processed/egfr_smiles_train.json
  val_path: data/processed/egfr_smiles_val.json
  max_len: 128
  state_mapping:
    DFGin_aCin: 0
    DFGin_aCout: 1
    DFGout_aCin: 2
    DFGout_aCout: 3

generation:
  n_samples_per_state: 100
  temperature: 0.8
  max_len: 128
  output_path: artifacts/generation/vae_candidates.json

kl_annealing:
  warmup_epochs: 50      # Increased from 20 to give decoder more time
  strategy: linear

teacher_forcing:
  start_ratio: 1.0       # Full teacher forcing at start
  end_ratio: 0.0         # Fully autoregressive by end
  warmup_epochs: 30      # Hold at 1.0 for first 30 epochs

early_stop_metric: val_recon_loss  # Track recon loss, not total (avoids KL artifacts)
