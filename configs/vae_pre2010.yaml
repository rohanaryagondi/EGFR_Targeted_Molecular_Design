# VAE config for retrospective validation: pre-2010 cutoff
# Trained only on EGFR compounds published before 2010.
# Same architecture as configs/vae.yaml, different data paths.

model:
  vocab_size: 150
  embed_dim: 128
  hidden_dim: 512
  latent_dim: 64
  n_layers: 2
  dropout: 0.2
  n_states: 3
  kl_weight: 0.01
  pad_idx: 0

training:
  epochs: 300
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.00001
  lr_scheduler: cosine
  patience: 40
  gradient_clip: 1.0
  device: auto
  checkpoint_dir: artifacts/models/vae_pre2010/
  log_dir: artifacts/logs/vae_pre2010/
  seed: 42
  num_workers: 4
  mixed_precision: false

data:
  train_path: data/processed/egfr_smiles_pre2010_train.json
  val_path: data/processed/egfr_smiles_pre2010_val.json
  max_len: 128
  state_mapping:
    DFGin_aCin: 0
    DFGin_aCout: 1
    DFGout_aCin: 2

generation:
  n_samples_per_state: 100
  temperature: 0.8
  max_len: 128
  output_path: artifacts/generation/vae_candidates_pre2010.json

kl_annealing:
  warmup_epochs: 50
  strategy: linear

teacher_forcing:
  start_ratio: 1.0
  end_ratio: 0.0
  warmup_epochs: 30

early_stop_metric: val_recon_loss
