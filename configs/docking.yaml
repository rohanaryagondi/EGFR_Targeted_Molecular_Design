# GNINA Physics-Informed Docking Configuration
# Workstream 11: integrates GNINA as tier 0 of the docking fallback chain.

gnina:
  binary_path: gnina                        # Path to GNINA binary (or "gnina" if on PATH)
  exhaustiveness: 8                         # Vina exhaustiveness parameter
  num_modes: 5                              # Number of binding poses to generate
  cnn_scoring: rescore                      # CNN scoring mode: none, rescore, refinement
  timeout_per_molecule: 120                 # Seconds before killing subprocess
  gpu: false                                # Use GPU acceleration for CNN scoring

receptor:
  output_dir: data/processed/docking/receptors/
  box_padding: 5.0                          # Angstroms of padding around pocket centroid
  default_box_size: [25.0, 25.0, 25.0]      # Default docking box size (Angstroms)

scoring:
  normalization: sigmoid                    # Score normalization method
  vina_scale: 3.0                           # Denominator in sigmoid(-vina_score / scale)
  score_source: vina                        # Score for ranking: vina, cnn_score, cnn_affinity

states:
  # Representative PDB structures for each conformational state.
  # 3iku was removed from the atlas (ParM, E. coli -- not EGFR).
  # 3w2r (T790M/L858R EGFR, DFGout_aCin) is the representative.
  representatives:
    DFGin_aCin: 1m17
    DFGin_aCout: 2gs7
    DFGout_aCin: 3w2r

batch:
  n_workers: 4                              # Parallel docking workers
